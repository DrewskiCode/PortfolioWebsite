<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drew Floyd · Resume</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #0b0b0c;
        color: #ededed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 20% 20%, rgba(255, 90, 31, 0.15), transparent 55%),
          radial-gradient(circle at 80% 30%, rgba(180, 240, 0, 0.12), transparent 55%),
          #0b0b0c;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 20px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(11, 11, 12, 0.9);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 2;
      }

      header a {
        color: #b4f000;
        text-decoration: none;
        font-size: 0.85rem;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      main {
        flex: 1;
        padding: 24px 28px 40px;
      }

      .frame {
        width: 100%;
        height: min(86vh, 980px);
        border: 2px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        overflow: hidden;
        background: rgba(21, 22, 26, 0.9);
      }

      .mobile-resume {
        display: none;
        border: 2px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 20px;
        text-align: center;
        background: rgba(21, 22, 26, 0.9);
        gap: 16px;
      }

      .mobile-resume p {
        margin: 0;
        color: #ededed;
        font-size: 0.95rem;
      }

      .mobile-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      .download {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        border: 2px solid #ff5a1f;
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 0.75rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #ff5a1f;
      }

      .download:hover {
        background: #ff5a1f;
        color: #0b0b0c;
      }

      @media (max-width: 720px) {
        .frame {
          display: none;
        }

        .mobile-resume {
          display: grid;
        }

        header {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/">← Back to portfolio</a>
      <a class="download" href="/resume.pdf" download>Download PDF</a>
    </header>
    <main>
      <div class="frame">
        <iframe src="/resume.pdf" title="Resume PDF" loading="lazy"></iframe>
      </div>
      <div class="mobile-resume">
        <p>View or download the resume PDF for the best mobile experience.</p>
        <div class="mobile-actions">
          <a class="download" href="/resume.pdf" target="_blank" rel="noreferrer">Open PDF</a>
          <a class="download" href="/resume.pdf" download>Download PDF</a>
        </div>
      </div>
    </main>
  </body>
</html>
